<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">账号辅助邮箱绑定</title>
  <desc id="desc">登录 outlook.com 后从右上角头像进入 My Microsoft account 管理账号。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12z" fill="#ef4444"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="#f6f7f9"/>
  <rect width="1600" height="44" fill="#242424"/>
  <circle cx="22" cy="22" r="10" fill="#6b7280"/>
  <circle cx="58" cy="22" r="10" fill="#6b7280"/>
  <circle cx="94" cy="22" r="10" fill="#6b7280"/>
  <rect x="120" y="9" width="360" height="26" rx="13" fill="#111827"/>
  <text x="140" y="29" fill="#facc15" font-family="Arial, sans-serif" font-size="18">https://outlook.com/mail/</text>

  <rect y="44" width="1600" height="66" fill="#106ebe"/>
  <text x="46" y="87" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Outlook</text>
  <rect x="222" y="62" width="300" height="34" rx="6" fill="#fff"/>
  <text x="245" y="85" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18">搜索</text>

  <rect x="0" y="110" width="52" height="790" fill="#f3f4f6"/>
  <rect x="52" y="144" width="190" height="756" fill="#fff"/>
  <text x="88" y="206" fill="#111827" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="800">收件箱</text>
  <text x="88" y="262" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20">垃圾邮件</text>
  <text x="88" y="318" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20">草稿</text>
  <text x="88" y="374" fill="#374151" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20">已发送邮件</text>

  <rect x="242" y="144" width="300" height="756" fill="#f8fafc"/>
  <g font-family="Microsoft YaHei, Arial, sans-serif">
    <rect x="242" y="144" width="300" height="92" fill="#fff"/>
    <circle cx="285" cy="190" r="22" fill="#c7d2fe"/>
    <text x="326" y="184" fill="#111827" font-size="20" font-weight="800">Microsoft account team</text>
    <text x="326" y="212" fill="#0b63ce" font-size="19" font-weight="800">Microsoft account security...</text>
    <rect x="242" y="236" width="300" height="92" fill="#fff"/>
    <circle cx="285" cy="282" r="22" fill="#bfdbfe"/>
    <text x="326" y="276" fill="#111827" font-size="20" font-weight="800">Microsoft Account</text>
    <text x="326" y="304" fill="#0b63ce" font-size="19" font-weight="800">Welcome! Your Micros...</text>
    <rect x="242" y="328" width="300" height="92" fill="#fff"/>
    <circle cx="285" cy="374" r="22" fill="#c4b5fd"/>
    <text x="326" y="368" fill="#111827" font-size="20" font-weight="800">Outlook Team</text>
    <text x="326" y="396" fill="#0b63ce" font-size="19" font-weight="800">Welcome to your new...</text>
  </g>

  <g transform="translate(562 144)">
    <rect width="780" height="756" fill="#fff"/>
    <text x="350" y="352" text-anchor="middle" fill="#ef4444" font-family="Microsoft YaHei, Arial, sans-serif" font-size="56" font-weight="700">网址：outlook.com</text>
    <path d="M350 386l68 48h-136z" fill="#dbeafe"/>
    <rect x="296" y="438" width="108" height="68" rx="8" fill="#e5e7eb"/>
    <path d="M296 438l54 44 54-44" fill="none" stroke="#bfdbfe" stroke-width="8"/>
    <text x="350" y="548" text-anchor="middle" fill="#6b7280" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22">选择要阅读的项目</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1320" y="110" width="280" height="220" fill="#fff"/>
    <rect x="1320" y="110" width="280" height="56" fill="#fff"/>
    <text x="1350" y="145" fill="#6b7280" font-family="Segoe UI, Arial, sans-serif" font-size="21">Microsoft</text>
    <circle cx="1380" cy="220" r="54" fill="#777" stroke="#333" stroke-width="2"/>
    <circle cx="1380" cy="220" r="20" fill="none" stroke="#fff" stroke-width="5"/>
    <text x="1440" y="198" fill="#111827" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">账号名称</text>
    <text x="1440" y="226" fill="#374151" font-family="Segoe UI, Arial, sans-serif" font-size="18">example@outlook.com</text>
    <rect x="1434" y="240" width="144" height="42" fill="#fff" stroke="#ef4444" stroke-width="5"/>
    <text x="1450" y="267" fill="#0b63ce" font-family="Segoe UI, Arial, sans-serif" font-size="18">My Microsoft account</text>
  </g>

  <path d="M1458 520C1468 430 1488 340 1500 285" fill="none" stroke="#ef4444" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="810" y="820" text-anchor="middle" fill="#111827" font-family="Microsoft YaHei, Arial, sans-serif" font-size="34" font-weight="900">进入右上角头像菜单，点击 My Microsoft account 绑定辅助邮箱</text>
</svg>
