<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">新账号项目迁移</title>
  <desc id="desc">旧账号选择项目后分享，改为知道链接的所有人，复制链接并用新账号浏览器打开。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfdff"/>
      <stop offset="1" stop-color="#f3f8ff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="green" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#16a34a"/>
      <stop offset="1" stop-color="#86efac"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#1e3a8a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="800" y="145" text-anchor="middle" fill="#0f2f66" font-family="Microsoft YaHei, Arial, sans-serif" font-size="88" font-weight="900">新账号项目迁移</text>

  <g filter="url(#softShadow)">
    <rect x="42" y="198" width="310" height="528" rx="18" fill="#fff" stroke="#60a5fa" stroke-width="3"/>
    <rect x="42" y="198" width="310" height="80" rx="18" fill="#eff6ff"/>
    <text x="197" y="253" text-anchor="middle" fill="#2563eb" font-family="Microsoft YaHei, Arial, sans-serif" font-size="40" font-weight="900">旧账号</text>
    <rect x="74" y="315" width="246" height="365" rx="18" fill="#fff" stroke="#c7d2fe" stroke-width="3"/>
    <path d="M120 360h118c14 0 24 10 24 24v23h14c16 0 30 14 30 30v86c0 16-14 30-30 30H120c-16 0-30-14-30-30V390c0-16 14-30 30-30z" fill="url(#blue)"/>
    <circle cx="198" cy="480" r="43" fill="#dbeafe"/>
    <path d="M198 449l12 21 24 4-17 17 4 25-23-12-22 12 4-25-18-17 25-4z" fill="#2563eb"/>
    <rect x="111" y="585" width="178" height="14" rx="7" fill="#e5e7eb"/>
    <rect x="130" y="615" width="140" height="14" rx="7" fill="#e5e7eb"/>
    <text x="197" y="670" text-anchor="middle" fill="#111827" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="900">选择项目</text>

    <rect x="1250" y="198" width="310" height="528" rx="18" fill="#fff" stroke="#22c55e" stroke-width="3"/>
    <rect x="1250" y="198" width="310" height="80" rx="18" fill="#f0fdf4"/>
    <text x="1405" y="253" text-anchor="middle" fill="#16a34a" font-family="Microsoft YaHei, Arial, sans-serif" font-size="40" font-weight="900">新账号</text>
    <rect x="1282" y="315" width="246" height="365" rx="18" fill="#fff" stroke="#bbf7d0" stroke-width="3"/>
    <path d="M1340 374h120c14 0 24 10 24 24v22h16c16 0 30 14 30 30v83c0 16-14 30-30 30h-160c-16 0-30-14-30-30V404c0-16 14-30 30-30z" fill="url(#green)"/>
    <circle cx="1419" cy="485" r="46" fill="#dcfce7"/>
    <path d="M1396 485l17 17 36-42" fill="none" stroke="#16a34a" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="1319" y="585" width="178" height="14" rx="7" fill="#e5e7eb"/>
    <rect x="1338" y="615" width="140" height="14" rx="7" fill="#e5e7eb"/>
    <text x="1405" y="670" text-anchor="middle" fill="#16a34a" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="900">迁移成功</text>
  </g>

  <g font-family="Microsoft YaHei, Arial, sans-serif" text-anchor="middle" font-weight="900">
    <g transform="translate(470 455)">
      <circle r="72" fill="#eaf2ff"/>
      <circle cy="-126" r="27" fill="#2563eb"/>
      <text y="-115" fill="#fff" font-size="36">1</text>
      <path d="M-28 0h42c35 0 62-27 62-62" fill="none" stroke="#2563eb" stroke-width="20" stroke-linecap="round"/>
      <path d="M38-62l38 0 0 38" fill="none" stroke="#2563eb" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="-47" y="-24" width="68" height="58" rx="9" fill="none" stroke="#2563eb" stroke-width="14"/>
      <text y="128" fill="#111827" font-size="30">点击分享</text>
    </g>
    <g transform="translate(700 455)">
      <circle r="72" fill="#edf7ef"/>
      <circle cy="-126" r="27" fill="#2563eb"/>
      <text y="-115" fill="#fff" font-size="36">2</text>
      <circle cx="-18" cy="-14" r="25" fill="#16a34a"/>
      <circle cx="28" cy="-8" r="21" fill="#16a34a"/>
      <path d="M-62 52c12-40 37-59 70-59s58 19 70 59" fill="#16a34a"/>
      <circle cx="48" cy="42" r="32" fill="#dcfce7" stroke="#16a34a" stroke-width="10"/>
      <path d="M34 42l11 11 21-25" fill="none" stroke="#16a34a" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
      <text y="128" fill="#111827" font-size="30">访问对象改为</text>
      <text y="170" fill="#111827" font-size="30">“知道链接的所有人”</text>
    </g>
    <g transform="translate(930 455)">
      <circle r="72" fill="#eaf2ff"/>
      <circle cy="-126" r="27" fill="#2563eb"/>
      <text y="-115" fill="#fff" font-size="36">3</text>
      <path d="M-36 15l78-78c22-22 58 14 36 36L35 16" fill="none" stroke="#2563eb" stroke-width="16" stroke-linecap="round"/>
      <path d="M36-15l-78 78c-22 22-58-14-36-36l43-43" fill="none" stroke="#2563eb" stroke-width="16" stroke-linecap="round"/>
      <text y="128" fill="#111827" font-size="30">复制链接</text>
    </g>
    <g transform="translate(1160 455)">
      <circle r="72" fill="#eaf2ff"/>
      <circle cy="-126" r="27" fill="#2563eb"/>
      <text y="-115" fill="#fff" font-size="36">4</text>
      <rect x="-48" y="-36" width="96" height="78" rx="10" fill="#fff" stroke="#2563eb" stroke-width="12"/>
      <rect x="-48" y="-36" width="96" height="22" rx="8" fill="#2563eb"/>
      <circle cx="0" cy="9" r="28" fill="none" stroke="#2563eb" stroke-width="8"/>
      <path d="M-28 9h56M0-19c-14 16-14 40 0 56M0-19c14 16 14 40 0 56" fill="none" stroke="#2563eb" stroke-width="6"/>
      <text y="128" fill="#111827" font-size="30">新账号浏览器</text>
      <text y="170" fill="#111827" font-size="30">打开链接</text>
    </g>
  </g>

  <g fill="#2563eb">
    <path d="M354 452h68v-22l44 37-44 37v-22h-68z"/>
    <path d="M555 452h50v-22l44 37-44 37v-22h-50z"/>
    <path d="M802 452h50v-22l44 37-44 37v-22h-50z"/>
    <path d="M1035 452h50v-22l44 37-44 37v-22h-50z"/>
    <path d="M1231 452h50v-22l44 37-44 37v-22h-50z"/>
  </g>

  <rect x="42" y="760" width="1516" height="96" rx="14" fill="#f8fbff" stroke="#bfdbfe" stroke-width="3"/>
  <circle cx="523" cy="808" r="35" fill="#2563eb"/>
  <path d="M523 783v12M523 822v11M498 808h12M536 808h12M506 791l9 9M540 791l-9 9M507 825l8-8M540 825l-8-8" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
  <text x="800" y="825" text-anchor="middle" fill="#111827" font-family="Microsoft YaHei, Arial, sans-serif" font-size="36" font-weight="900">网络异常时，多尝试几次即可</text>
</svg>
